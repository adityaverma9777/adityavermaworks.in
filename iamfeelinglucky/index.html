<!doctype html>
<html>

<head>
    <title>Aditya Verma</title>
    <!-- Lock viewport on mobile devices. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta names="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon-precomposed" href="../assets/favicon.png" />
    <link rel="icon" type="image/png" href="../assets/favicon.png" />

    <style>
        @font-face {
            font-family: 'Minecraftia';
            src: url('../assets/fonts/Minecraftia-Regular.ttf') format('truetype');
        }

        #game-header {
            position: fixed;
            /* Changed from absolute to fixed */
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10000;
            /* Increased z-index */
            pointer-events: none;
            /* Let clicks pass through container */
        }

        .back-link {
            color: #fff;
            text-decoration: none;
            font-family: 'Minecraftia', sans-serif;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
            transition: opacity 0.2s;
            cursor: pointer;
            touch-action: manipulation;
            /* Allow clicks */
            padding: 15px;
            /* Increase touch target */
            margin: -15px;
            /* Offset padding layout shift */
            position: relative;
            z-index: 20000;
            /* Increased z-index */
            pointer-events: auto;
            /* Re-enable clicks */
        }

        .back-link:active {
            opacity: 0.5;
        }

        .back-arrow {
            font-size: 20px;
            position: relative;
            top: 3px;
        }

        .brand-text {
            color: #fff;
            font-family: 'Minecraftia', sans-serif;
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
    <!-- Existing styles continue... -->
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            /* Prevent scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            touch-action: none;
            /* Disable double-tap zoom etc */
        }

        @font-face {
            font-family: 'ArcadeR';
            src: url('font/ARCADE_R.TTF');
        }

        #game-container {
            position: relative;
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }

        #canvas-warning {
            color: #FF0;
            font-size: 1.5em;
        }

        /* Controls Container */
        #controls-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(2, 85px);
            gap: 15px;
            justify-content: center;
            background: #222;
            padding: 20px;
            border-radius: 20px;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .control-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000);
            border: 4px solid #8b0000;
            box-shadow:
                0 6px 0 #8b0000,
                0 8px 10px rgba(0, 0, 0, 0.5),
                inset 2px 2px 5px rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-up {
            grid-column: 2;
            grid-row: 1;
        }

        #btn-left {
            grid-column: 1;
            grid-row: 2;
        }

        #btn-down {
            grid-column: 2;
            grid-row: 2;
        }

        #btn-right {
            grid-column: 3;
            grid-row: 2;
        }
    </style>

    <script src="pacman.js"></script>

</head>

<body>

    <div id="game-header">
        <a href="/" class="back-link" onclick="window.location.href='/'; return false;"
            ontouchend="window.location.href='/'; return false;">
            <span class="back-arrow">←</span> Back
        </a>
        <span class="brand-text">| Aditya Verma</span>
    </div>

    <div style='font-family: ArcadeR; position:absolute; visibility:hidden'>.</div>

    <div id="game-container">
        <canvas id='canvas'>
            <div id="canvas-warning">Your browser does not support HTML Canvas. Please upgrade!</div>
        </canvas>
        <canvas id='atlas' style="display:none"></canvas>
    </div>

    <div id="controls-container">
        <div id="btn-up" class="control-btn" data-key="38"></div>
        <div id="btn-left" class="control-btn" data-key="37"></div>
        <div id="btn-down" class="control-btn" data-key="40"></div>
        <div id="btn-right" class="control-btn" data-key="39"></div>
    </div>

    <script>
        // Keyboard Simulation Logic
        // KeyCodes: Up=38, Down=40, Left=37, Right=39

        function simulateKeyEvent(type, keyCode) {
            var event = new KeyboardEvent(type, {
                bubbles: true,
                cancelable: true,
                keyCode: keyCode,
                which: keyCode,
                key: (keyCode === 37 ? 'ArrowLeft' : keyCode === 38 ? 'ArrowUp' : keyCode === 39 ? 'ArrowRight' : 'ArrowDown')
            });
            // Hack for older properties if needed by game
            delete event.keyCode;
            Object.defineProperty(event, "keyCode", { "value": keyCode });
            delete event.which;
            Object.defineProperty(event, "which", { "value": keyCode });

            window.dispatchEvent(event);
        }

        var buttons = document.querySelectorAll('.control-btn');
        buttons.forEach(function (btn) {
            var keyCode = parseInt(btn.getAttribute('data-key'));

            var startHandler = function (e) {
                e.preventDefault(); // Prevent text selection / touch scroll
                simulateKeyEvent('keydown', keyCode);
                btn.classList.add('pressed');
            };

            var endHandler = function (e) {
                e.preventDefault();
                simulateKeyEvent('keyup', keyCode);
                btn.classList.remove('pressed');
            };

            btn.addEventListener('mousedown', startHandler);
            btn.addEventListener('mouseup', endHandler);
            btn.addEventListener('touchstart', startHandler, { passive: false });
            btn.addEventListener('touchend', endHandler, { passive: false });
            btn.addEventListener('touchcancel', endHandler, { passive: false });
        });
    </script>

</body>

</html>
