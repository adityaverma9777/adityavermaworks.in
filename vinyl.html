<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinematic Vinyl | Aditya Verma</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/vinyl.css">
</head>

<body>

    <div id="app-root">
        <!-- 1. HEADER (Fixed Top) -->
        <header class="cinematic-header">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>ADITYA VERMA</span>
            </a>

            <div class="track-status">
                <span id="statusIndicator">IDLE</span>
            </div>

            <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
                    </path>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <!-- 2. TURNTABLE STAGE (Hero) -->
        <div id="turntable-stage">
            <div class="turntable-unit">
                <div class="platter-base"></div>
                <!-- Vinyl rotates via JS -->
                <div class="vinyl-record" id="activeVinyl">
                    <div class="grooves"></div>
                    <div class="vinyl-label" id="vinylLabel"></div>
                    <div class="spindle-hole"></div>
                </div>
                <div class="tonearm-system" id="tonearm">
                    <div class="pivot"></div>
                    <div class="arm"></div>
                    <div class="headshell"></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-layer">
                <div class="track-display">
                    <h2 id="trackTitle">Select a Record</h2>
                    <p id="trackArtist">Collection</p>
                </div>
                <button id="mainPlayBtn" class="play-fab" aria-label="Play">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="icon-play">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg viewBox="0 0 24 24" fill="currentColor" class="icon-pause">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- 3. FLIGHT ZONE (Transient Animation) -->
        <div id="flight-zone"></div>

        <!-- 4. PERSPECTIVE DECK (Navigation) -->
        <div id="perspective-deck">
            <!-- Items injected by JS -->
        </div>
    </div>

    <audio id="audioPlayer"></audio>
    <!-- Dependencies -->
    <script src="js/main.js"></script>
    <script src="js/vinyl.js"></script>
</body>

</html>
